syntax = "proto3";

package room.v1;

import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";

option go_package = "proto/room/v1;roomv1";


enum RequestStatus {
  REQUEST_STATUS_UNSPECIFIED = 0;
  REQUEST_STATUS_PENDING     = 1;
  REQUEST_STATUS_ACCEPTED    = 2;
  REQUEST_STATUS_REJECTED    = 3;
}


message Room {
  string room_uuid    = 1;
  string name         = 2;
  string admin_id     = 3;
  bool   is_private   = 4;
  string group_id     = 5; // optional
  int32  member_count = 6;
  google.protobuf.Timestamp created_at = 7;
  google.protobuf.Timestamp updated_at = 8;
}
message RoomMember {
  string user_uuid = 1;
  google.protobuf.Timestamp joined_at = 2;
}
message RoomInvite {
  string invite_id  = 1;
  string room_uuid  = 2;
  int32  uses_left   = 3; 
  google.protobuf.Timestamp expires_at   = 4; 
  google.protobuf.Timestamp created_at   = 5;
}
message JoinRequest {
  string room_uuid   = 1;
  string user_uuid   = 2;
  string username    = 3;
  string public_key  = 4;
  RequestStatus status = 5;
  google.protobuf.Timestamp created_at = 6;
}


message CreateRoomRequest {
  string name       = 1;
  bool   is_private = 2;
  string group_id   = 3; // optional
}
message CreateRoomResponse {
  string room_uuid = 1;
  google.protobuf.Timestamp created_at = 2;
}
message GetRoomRequest {
  string room_uuid = 1;
}
message GetRoomResponse {
  Room room = 1;
}
message UpdateRoomNameRequest {
  string room_uuid = 1;
  string name      = 2;
}
message DeleteRoomRequest {
  string room_uuid = 1;
}
message GetUserRoomsRequest {}
message UserRoom {
  string room_uuid    = 1;
  string name         = 2;
  bool   is_private   = 3;
  int32  unread_count = 4;
  google.protobuf.Timestamp joined_at  = 5;
  google.protobuf.Timestamp updated_at = 6;
}
message GetUserRoomsResponse {
  repeated UserRoom rooms = 1;
}


message GetRoomMembersRequest {
  string room_uuid = 1;
}
message GetRoomMembersResponse {
  repeated RoomMember members = 1;
}
message LeaveRoomRequest {
  string room_uuid = 1;
}
message RemoveMemberRequest {
  string room_uuid = 1;
  string user_uuid = 2;
}


message CreateInviteRequest {
  string room_uuid  = 1;
  int32  uses_left   = 2; //0 or negative is unlimited
  google.protobuf.Timestamp expires_at = 3; // 0 = unlimited
}
message CreateInviteResponse {
  string invite_id = 1;
}
message GetInviteRequest {
  string invite_id = 1;
}
message GetInviteResponse {
  RoomInvite invite = 1;
}
message DeleteInviteRequest {
  string invite_id = 1;
  string room_uuid = 2;
}
message JoinViaInviteRequest {
  string invite_id = 1;
}


message CreateJoinRequestRequest {
  string room_uuid  = 1;
  string public_key = 2;
}
message GetJoinRequestsRequest {
  string room_uuid = 1;
}
message GetJoinRequestsResponse {
  repeated JoinRequest requests = 1;
}
message RespondToJoinRequestRequest {
  string room_uuid   = 1;
  string user_uuid   = 2; // Joining user id
  RequestStatus decision = 3; 
  string encrypted_key = 4;
}
message PendingKeysResponse {
  repeated PendingKey pending_keys = 1;
}
message PendingKey {
  string room_uuid = 1;
}
message AcknowledgeKeyDeliveryRequest {
  string room_uuid = 1;
}

message MarkAsReadRequest {
  string room_uuid          = 1;
  string last_read_message_id = 2;
}
message GetUnreadCountRequest {
  string room_uuid = 1;
}
message GetUnreadCountResponse {
  int32 unread_count = 1;
}


message GetAllowedRoomsRequest {
  string user_uuid = 1;
}
message GetAllowedRoomsResponse {
  repeated string room_uuids = 1;
}

service RoomService {
  rpc CreateRoom(CreateRoomRequest) returns (CreateRoomResponse);
  rpc GetRoom(GetRoomRequest) returns (GetRoomResponse);
  rpc UpdateRoomName(UpdateRoomNameRequest) returns (google.protobuf.Empty);
  rpc DeleteRoom(DeleteRoomRequest) returns (google.protobuf.Empty);
  rpc GetUserRooms(GetUserRoomsRequest) returns (GetUserRoomsResponse);

  rpc GetRoomMembers(GetRoomMembersRequest) returns (GetRoomMembersResponse);
  rpc LeaveRoom(LeaveRoomRequest) returns (google.protobuf.Empty);
  rpc RemoveMember(RemoveMemberRequest) returns (google.protobuf.Empty);

  rpc CreateInvite(CreateInviteRequest) returns (CreateInviteResponse);
  rpc GetInvite(GetInviteRequest) returns (GetInviteResponse);
  rpc DeleteInvite(DeleteInviteRequest) returns (google.protobuf.Empty);
  rpc JoinViaInvite(JoinViaInviteRequest) returns (google.protobuf.Empty);

  rpc CreateJoinRequest(CreateJoinRequestRequest) returns (google.protobuf.Empty);
  rpc GetJoinRequests(GetJoinRequestsRequest) returns (GetJoinRequestsResponse);
  rpc RespondToJoinRequest(RespondToJoinRequestRequest) returns (google.protobuf.Empty);
  rpc GetPendingKeys(google.protobuf.Empty) returns (PendingKeysResponse);
  rpc AcknowledgeKeyDelivery(AcknowledgeKeyDeliveryRequest) returns (google.protobuf.Empty);

  rpc MarkAsRead(MarkAsReadRequest) returns (google.protobuf.Empty);
  rpc GetUnreadCount(GetUnreadCountRequest) returns (GetUnreadCountResponse);

  rpc GetAllowedRooms(GetAllowedRoomsRequest) returns (GetAllowedRoomsResponse);
}
